# /root/ca-external-step2.cfg sur ica01
# pkispawn, etape 2 : import du certificat intermediaire signe par la racine
# et de la chaine de confiance, puis finalisation de l'instance Dogtag.

[DEFAULT]
pki_instance_name=pki-tomcat

pki_https_port=8443
pki_http_port=8080

pki_admin_password=[REDACTED]
pki_client_database_password=[REDACTED]
pki_client_pkcs12_password=[REDACTED]
pki_ds_password=[REDACTED]
pki_security_domain_password=[REDACTED]

pki_hostname=ica01.cercueil.local

[CA]
pki_external=True
pki_external_step_two=True

pki_ca_signing_subject_dn=CN=Cercueil Intermediate CA,O=Cercueil,C=FR

pki_ds_url=ldap://127.0.0.1:389

pki_ca_signing_cert_path=/root/ica-signing.crt
pki_cert_chain_path=/root/ca-chain.crt
