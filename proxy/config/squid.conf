# /etc/squid/squid.conf

# ============================================
# Authentification Kerberos (SSO Active Directory)
# ============================================

# Helper Negotiate/Kerberos : valide localement les tickets des clients avec le keytab
# negotiate : mécanisme qui génère le header HTTP Proxy-Authenticate: Negotiate
# -k : chemin du keytab    -s : SPN du proxy dans l'AD
# -d : activer pour le débogage verbose, puis surveiller avec : sudo tail -f /var/log/squid/cache.log
auth_param negotiate program /usr/lib64/squid/negotiate_kerberos_auth -k /etc/squid/squid.keytab -s HTTP/proxy.cercueil.local@CERCUEIL.LOCAL
auth_param negotiate children 20 startup=0 idle=1
auth_param negotiate keep_alive on

# ============================================
# Access Control Lists (ACLs)
# ============================================
# types d'ACL les plus courants :
# src            	IP/sous-réseau source (qui fait la requête)
# dst            	IP destination
# dstdomain      	domaine destination (.google.com)
# port           	port destination
# method         	méthode HTTP (GET, POST, CONNECT)
# proxy_auth     	utilisateur authentifié (REQUIRED = n'importe lequel)
# time           	plage horaire
# url_regex      	expression régulière sur l'URL complète
# urlpath_regex  	expression régulière sur le chemin de l'URL
# ssl::server_name  nom du serveur via SNI (pour HTTPS)
# at_step        	étape du SSL bump (SslBump1/2/3)



# Define the network
acl localnet src 10.0.0.0/8

acl lan src 10.0.0.0/8
acl dmz src 10.1.0.0/8

acl vpn src 10.1.103.0/24
acl vpn src 172.31.250.0/24

acl adds src 10.0.70.0/24
acl rodc src 10.0.71.0/24
acl backup src 10.0.40.0/24
acl web src 10.0.32.0/24
acl sécurité src 10.0.50.0/24
acl dns src 10.0.60.0/24
acl core src 10.0.30.0/24
acl app src 10.0.31.0/24
acl fichiers src 10.0.20.0/24
acl quarantaine src 10.0.11.0/24
acl users src 10.0.13.0/24
acl gests src 10.0.12.0/24
acl bastion src 10.0.72.0/24
acl inbound src 10.1.100.0/24
acl outbound src 10.1.101.0/24
acl mail src 10.1.102.0/24

# Postes utilisateurs (accès internet uniquement après authentification Kerberos)
acl postes_utilisateurs src 10.0.13.0/24   # VLAN USERS
acl postes_utilisateurs src 10.0.11.0/24   # VLAN Quarantaine

# Machines / réseaux avec accès Internet
acl internet src 10.0.12.0/24    # VLAN invités
acl internet src 10.0.30.19      # Machine d'admin
acl internet src 10.0.30.3       # WSUS
acl internet src 10.0.50.0/24    # VLAN sécurité

# Machines / réseaux sans accès Internet
acl no_internet src 10.0.20.0/24   # VLAN fichiers
acl no_internet src 10.0.31.0/24   # VLAN ERP
acl no_internet src 10.0.32.0/24   # VLAN Web
acl no_internet src 10.0.40.0/24   # VLAN Backup
acl no_internet src 10.0.60.0/24   # VLAN DNS
acl no_internet src 10.0.71.0/24   # VLAN RODC
acl no_internet src 10.1.100.0/24  # VLAN Inbound
acl no_internet src 10.0.70.0/24   # VLAN ADDS
acl no_internet src 10.0.30.2      # DNS maître
acl no_internet src 10.0.50.0/24   # VLAN sécurité


# Trafic arrivant sur les ports d'interception (3127/3129 nommés "transparent")
# myportname matche le name= des http_port/https_port
acl from_transparent myportname transparent

# Trafic arrivant sur les ports d'interception (3128 nommés "explicit")
# myportname matche le name= des http_port/https_port
acl from_explicit myportname explicit

# Utilisateurs authentifiés (n'importe quel utilisateur AD via Kerberos)
acl authenticated_users proxy_auth REQUIRED

# Standard ports
acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl Safe_ports port 1025-65535  # unregistered ports

acl CONNECT method CONNECT

# SSL bump step ACLs
acl step1 at_step SslBump1      # Les infos de la requête connect (IP et domaine)
acl step2 at_step SslBump2      # Le SNI
acl step3 at_step SslBump3      # Le certificat du serveur destination

# Define domains to never bump (banking, healthcare, etc.)
acl nobump_domains ssl::server_name .bank.com
acl nobump_domains ssl::server_name .healthcare.gov
acl nobump_domains ssl::server_name .paypal.com

# défini ou sont les domaines bloqués (HTTP et HTTPS) se basant sur le header Host
acl blocked_http_domains dstdomain "/etc/squid/blocked_domains.txt"
# défini ou sont les domaines bloqués (HTTP et HTTPS) se basant sur le SNI
acl blocked_tls_domains ssl::server_name --client-requested "/etc/squid/blocked_domains.txt"

#// ------------------------------------------------------ //
#// ----------------- HTTP ACCESS RULES ---------------- //
#// ------------------------------------------------------ //

# Allow localhost management
http_access allow localhost manager
http_access deny manager

#// ------------------------------------------------------ //
#// ------------ FICHIERS DE CONF EXTERNALISÉS ----------- //
#// ------------------------------------------------------ //

include /etc/squid/conf.d/deny_generaux.conf
include /etc/squid/conf.d/no_connection.conf
include /etc/squid/conf.d/transparent.conf
include /etc/squid/conf.d/explicite.conf

# ============================================
# Listening Ports
# ============================================

# Standard explicit proxy port with SSL bumping for CONNECT requests
http_port 3128 ssl-bump \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB \
    tls-cert=/etc/squid/ssl_cert/proxyserver.crt \
    tls-key=/etc/squid/ssl_cert/squid-ca.key \
	name=explicit

# Transparent interception port for HTTPS
https_port 3129 intercept \
    ssl-bump \
    generate-host-certificates=on \
    dynamic_cert_mem_cache_size=16MB \
    tls-cert=/etc/squid/ssl_cert/proxyserver.crt \
    tls-key=/etc/squid/ssl_cert/squid-ca.key \
	name=transparent

# Transparent interception port for HTTP
http_port 3127 intercept \
name=transparent

# ============================================
# SSL Bump Rules
# ============================================

# Peek at the ClientHello to extract the SNI, le rendre disponible à step2
ssl_bump peek step1

# Don't bump certain domains (splice = transparent passthrough)
ssl_bump splice step2 nobump_domains

# don't bump certain repository domains (splice = transparent passthrough)
ssl_bump splice step2 repos_tls

ssl_bump terminate step2 no_internet

# Bump everything else (terminate client SSL and re-encrypt to server)
ssl_bump bump all

# ============================================
# Certificate Generation
# ============================================

# Path to the cert generator helper (Fedora : /usr/lib64/squid/)
sslcrtd_program /usr/lib64/squid/security_file_certgen \
    -s /var/spool/squid/ssl_db \
    -M 4MB

# Number of cert generator processes
sslcrtd_children 8 startup=1 idle=1

# ============================================
# Caching Configuration
# ============================================

# Cache directory (100MB)
cache_dir ufs /var/spool/squid 100 16 256

# Memory cache size
cache_mem 256 MB

# Maximum object size to cache (in memory and on disk)
maximum_object_size_in_memory 512 KB
maximum_object_size 50 MB

# ============================================
# Logging
# ============================================

# Log format incluant les domaines SSL bumpés et l'identité de l'utilisateur (%[un)
logformat mon_format %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log /var/log/squid/access.log mon_format
cache_log /var/log/squid/cache.log

# ============================================
# Performance Settings
# ============================================

# DNS servers : résolveur externe (VLAN 101) + résolveur LAN (VLAN 60)
dns_nameservers 10.1.101.5 10.0.60.2

# Taille max des headers de requête client (augmenter si error:request buffer full)
request_header_max_size 64 KB