# /etc/dovecot/dovecot.conf - Mailbox server (mailbox.cercueil.local, 10.0.32.3)
# Dovecot 2.4.3 (nouvelle syntaxe de configuration), version finale du 30/05/2026.

dovecot_config_version = 2.4.3
dovecot_storage_version = 2.4.3

# Protocoles : IMAP pour les clients, LMTP pour la remise locale par Postfix
protocols {
  imap = yes
  lmtp = yes
}

# Stockage : un repertoire par utilisateur, detenu par le compte systeme vmail
# (aucun compte Linux reel n'est cree pour les utilisateurs de l'AD)
mail_home = /srv/mail/%{user}
mail_driver = sdbox
mail_path = ~/mail
mail_uid = vmail
mail_gid = vmail
first_valid_uid = 5000

namespace inbox {
  inbox = yes
  separator = /
}

# Authentification sur l'Active Directory via LDAPS (compte de service dedie)
ldap_uris = ldaps://dc01.cercueil.local:636
ldap_base = DC=cercueil,DC=local
ldap_auth_dn = CN=svc_dovecot_ldap,OU=ServiceAccounts,OU=T1,OU=TieredAdministration,DC=cercueil,DC=local
ldap_auth_dn_password = [REDACTED]
ldap_version = 3

# Durcissement de l'authentification
auth_failure_delay = 2s          # temporisation anti brute force
auth_allow_cleartext = no        # aucun mot de passe hors TLS

# Recherche de l'utilisateur par adresse mail ou UPN
passdb ldap {
  filter = (|(mail=%{user})(userPrincipalName=%{user}))
  bind = yes
}
userdb ldap {
  filter = (|(mail=%{user})(userPrincipalName=%{user}))
  fields {
    home = /srv/mail/%{user}
    uid = vmail
    gid = vmail
  }
}

# TLS obligatoire, certificat emis par la PKI interne + parametres Diffie-Hellman
ssl = required
ssl_cipher_list = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
ssl_min_protocol = TLSv1.2
ssl_server {
  cert_file = /etc/pki/tls/certs/fullchain.pem
  key_file  = /etc/pki/tls/private/dovecot.pem
  dh_file   = /etc/pki/tls/certs/dhparams.pem
}

# Remise LMTP interne (Postfix local -> Dovecot), non exposee sur le reseau
service lmtp {
  user = vmail
  process_min_avail = 5
  inet_listener lmtp {
    listen = 127.0.0.1
    port = 24
  }
}

# Sockets d'authentification. Le mode 0660 sur le socket Postfix est
# necessaire au fonctionnement du SSO Kerberos (GSSAPI).
service auth {
  unix_listener auth-userdb {
    mode = 0660
    user = vmail
    group = vmail
  }
  unix_listener /var/spool/postfix/private/auth {
    mode = 0660
    user = postfix
    group = postfix
  }
}

# Limitation de debit des connexions
service anvil {
  unix_listener anvil {
    mode = 0660
    user = vmail
    group = vmail
  }
}

!include_try conf.d/*.conf
