# /etc/nginx/conf.d/cercueil.conf
# Configuration du reverse proxy en production, transcrite depuis la
# documentation du projet (capture assets/config-nginx-cercueil.png).

server {
    server_name cercueil.fun www.cercueil.fun;

    location / {
        # Backend unique : nginx frontal du serveur web (LAN)
        proxy_pass http://10.0.32.5;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # En-tetes de securite injectes pour toutes les reponses
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self' data:; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    }

    # Terminaison TLS avec certificat Let's Encrypt
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cercueil.fun/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cercueil.fun/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    # Redirection systematique HTTP vers HTTPS
    if ($host = www.cercueil.fun) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = cercueil.fun) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name cercueil.fun www.cercueil.fun;
    return 301 https://$host$request_uri; # managed by Certbot
}
