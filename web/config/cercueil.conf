# /etc/nginx/conf.d/cercueil.conf
# Nginx local du serveur web (10.0.32.5) : sert le frontend Vue.js compile
# et relaie les appels API vers le backend Node.js (port 3001, gere par PM2).
server {
    listen 80 default_server;
    server_name localhost;

    # Frontend Vue.js compile (npm run build -> dist/)
    root /var/www/cercueilfun/cercueil-frontend/dist;
    index index.html;

    # Application monopage : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API backend Node.js, exposee uniquement en local
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
