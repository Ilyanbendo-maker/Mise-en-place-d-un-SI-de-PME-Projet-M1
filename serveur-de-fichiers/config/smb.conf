# /etc/samba/smb.conf
# Transcription des captures de la documentation projet (serveur de fichiers).
# Aucun secret ne figure dans ce fichier ; le keytab machine reste sur le serveur.

[global]
        # Membre de domaine Active Directory (pas de controleur, pas de comptes locaux)
        security = ADS
        realm = CERCUEIL.LOCAL
        workgroup = CERCUEIL
        kerberos method = secrets and keytab

        # Mappage d'identites : plage locale par defaut, comptes du domaine via sssd
        idmap config * : backend = tdb
        idmap config * : range = 10000-19999
        idmap config CERCUEIL : backend = sss
        idmap config CERCUEIL : range = 20000-2147483647

        ;passdb backend = tdbsam
        log level = 3
        winbind normalize names = yes

        # Bloc impression herite de la configuration par defaut (pas de role d'impression)
        printing = cups
        printcap name = cups
        load printers = yes
        cups options = raw

        # Install samba-usershares package for support
        include = /etc/samba/usershares.conf

[Bureautique]
        comment = Documents publics et modeles
        path = /srv/samba/bureautique
        browseable = yes
        read only = no
        valid users = "@utilisateurs du domaine"

[Confidentiel]
        comment = Document restreints ou confidentiel
        path = /srv/samba/confidentiel
        browseable = yes
        read only = no
        valid users = "@metier_confidentiel"
        # Chiffrement SMB obligatoire sur le partage sensible
        smb encrypt = required
