# Extrait ajoute en fin de C:\Program Files\nxlog\conf\nxlog.conf
# Canal alternatif de collecte Windows : NXLog vers l'entree GELF UDP 12201.

# Recuperer les journaux de l'observateur d'evenements
# (im_msvistalog : compatible de Windows Server 2008 aux versions actuelles)
<Input in>
    Module      im_msvistalog
</Input>

# Sortie GELF vers le serveur Graylog
<Extension gelf>
    Module        xm_gelf
</Extension>

<Output graylog_udp>
    Module        om_udp
    Host          192.168.10.220   # adresse d'exemple conservee dans la documentation ;
                                   # dans la maquette l'entree ecoute sur 10.0.50.20:12201
    Port          12201
    OutputType    GELF_UDP
</Output>

# Routage des flux in vers out
<Route 1>
    Path        in => graylog_udp
</Route>
