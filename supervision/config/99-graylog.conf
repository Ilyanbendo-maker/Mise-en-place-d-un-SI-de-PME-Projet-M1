# /etc/rsyslog.d/99-graylog.conf
# Fichier gere automatiquement par Ansible
# Transfert des logs systeme vers le serveur Graylog (entree Syslog UDP 1514)
# Le selecteur varie selon l'hote : exemple ci-dessous releve sur la passerelle mail ;
# la version generique documentee transfere l'integralite des journaux (*.*).

mail.*;authpriv.*;*.err action(type="omfwd" target="10.0.50.20" port="1514" protocol="udp" template="RSYSLOG_SyslogProtocol23Format")
