# Configuration de collecteur "Winlogbeat workstation", geree cote serveur
# (System > Sidecars > Configuration) et poussee automatiquement aux Sidecars.
# Le fichier local C:\Program Files\Graylog\sidecar\winlogbeat.conf est ecrase
# a chaque synchronisation : toute modification se fait dans l'interface Graylog.

# Needed for Graylog
fields_under_root: true
fields.collector_node_id: ${sidecar.nodeName}
fields.gl2_source_collector: ${sidecar.nodeId}

output.logstash:
   hosts: ["10.0.50.20:5044"]
path:
  data: ${sidecar.spoolDir!"C:\\Program Files\\Graylog\\sidecar\\cache\\winlogbeat"}\data
  logs: ${sidecar.spoolDir!"C:\\Program Files\\Graylog\\sidecar"}\logs
tags:
 - windows
winlogbeat:
  event_logs:
    - name: Application
      ignore_older: 96h
    - name: System
      ignore_older: 96h
    - name: Security
      ignore_older: 96h
    - name: Setup
      ignore_older: 96h
    - name: ForwardedEvents
      forwarded: true
      ignore_older: 96h
    - name: Microsoft-Windows-Windows Defender/Operational
      ignore_older: 96h
    - name: Microsoft-Windows-Sysmon/Operational
      ignore_older: 96h
