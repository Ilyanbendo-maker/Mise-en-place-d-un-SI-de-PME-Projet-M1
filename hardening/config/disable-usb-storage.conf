# /etc/modprobe.d/disable-usb-storage.conf - blocage du stockage USB (parc Linux)
# Le module usb-storage est remplace par /bin/true au chargement :
# aucun peripherique de stockage amovible ne peut etre monte.
# Sur Debian, l'initramfs est regeneree (update-initramfs -u) pour que
# le blocage soit effectif des le boot.
install usb-storage /bin/true
